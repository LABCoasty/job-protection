<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --background: oklch(0.13 0.01 250);
      --foreground: oklch(0.95 0 0);
      --card: oklch(0.17 0.01 250);
      --primary: oklch(0.75 0.15 175);
      --primary-foreground: oklch(0.13 0.01 250);
      --muted-foreground: oklch(0.6 0.02 220);
      --border: oklch(0.28 0.01 250);
      --radius: 0.5rem;
      --danger: oklch(0.6 0.2 25);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: var(--background);
      color: var(--foreground);
      min-height: 100vh;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      max-width: 360px;
    }

    .hero {
      text-align: center;
      margin-bottom: 20px;
    }
    .hero-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 14px;
      border-radius: 14px;
      background: oklch(0.75 0.15 175 / 0.15);
      border: 1px solid oklch(0.75 0.15 175 / 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-icon svg {
      width: 28px;
      height: 28px;
      color: var(--primary);
    }
    .hero h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 8px 0;
      color: var(--foreground);
    }
    .hero p {
      font-size: 14px;
      line-height: 1.5;
      margin: 0;
      color: var(--muted-foreground);
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: var(--primary);
      color: var(--primary-foreground);
      border: none;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn svg { width: 20px; height: 20px; flex-shrink: 0; }

    .status {
      margin-top: 16px;
      font-size: 14px;
      min-height: 1.4em;
      color: var(--muted-foreground);
    }
    .status.error { color: var(--danger); }
    .status.success { color: oklch(0.7 0.18 145); }

    .settings-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted-foreground);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .settings-link:hover { color: var(--foreground); }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
    }
    .quick-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.15s, background 0.15s;
    }
    .quick-btn:hover {
      border-color: var(--primary);
      background: oklch(0.75 0.15 175 / 0.08);
    }
    .quick-btn svg { color: var(--primary); flex-shrink: 0; }

    .view-scan { display: block; }
    .view-report { display: none; }
    body.report .view-scan { display: none; }
    body.report .view-report { display: flex; flex-direction: column; height: 100vh; }
    body.report { padding: 0; margin: 0; }
    .report-toolbar {
      flex-shrink: 0;
      padding: 10px 12px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .report-toolbar .btn-outline {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
      border-radius: var(--radius);
    }
    .report-toolbar .btn-outline:hover { opacity: 0.9; }
    .report-frame-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
    }
    .report-frame-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div id="view-scan" class="view-scan">
  <div class="card">
    <div class="hero">
      <div class="hero-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>
        </svg>
      </div>
      <h1>Trust Check for Job Posts</h1>
      <p>Verify job listings before you apply. Get risk scores and evidence-based analysis.</p>
    </div>
    <button id="scan" class="btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18"/>
        <path d="M7 12h10"/>
        <path d="M10 18h4"/>
        <path d="M5 12l2-6h10l2 6"/>
      </svg>
      Scan this listing
    </button>
    <div id="status" class="status"></div>
    <div class="quick-actions">
      <button id="open-resume" class="quick-btn" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <line x1="10" y1="9" x2="8" y2="9"/>
        </svg>
        <span>Resume</span>
      </button>
      <button id="open-sheets" class="quick-btn" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="3" y1="15" x2="21" y2="15"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
          <line x1="15" y1="3" x2="15" y2="21"/>
        </svg>
        <span>Google Sheets</span>
      </button>
    </div>
    <button id="open-options" class="settings-link" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      JobGuard settings
    </button>
  </div>
  </div>

  <div id="view-report" class="view-report">
    <div class="report-toolbar">
      <span style="font-weight: 600; color: var(--foreground);">Report</span>
      <button type="button" id="scan-another" class="btn-outline">Scan another</button>
    </div>
    <div class="report-frame-wrap">
      <iframe id="report-frame" title="JobGuard report"></iframe>
    </div>
  </div>

  <script type="module" src="panel.js"></script>
</body>
</html>
