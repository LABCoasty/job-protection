<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    /* Match frontend globals.css – dark theme, same tokens */
    :root {
      --background: oklch(0.13 0.01 250);
      --foreground: oklch(0.95 0 0);
      --card: oklch(0.17 0.01 250);
      --primary: oklch(0.75 0.15 175);
      --primary-foreground: oklch(0.13 0.01 250);
      --muted-foreground: oklch(0.6 0.02 220);
      --border: oklch(0.28 0.01 250);
      --radius: 0.5rem;
      --danger: oklch(0.6 0.2 25);
    }

    * { box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: var(--background);
      color: var(--foreground);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .hero {
      text-align: center;
      margin-bottom: 16px;
    }
    .hero-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      border-radius: 12px;
      background: oklch(0.75 0.15 175 / 0.15);
      border: 1px solid oklch(0.75 0.15 175 / 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-icon svg {
      width: 24px;
      height: 24px;
      color: var(--primary);
    }
    .hero h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 6px 0;
      color: var(--foreground);
    }
    .hero p {
      font-size: 13px;
      line-height: 1.4;
      margin: 0;
      color: var(--muted-foreground);
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--primary);
      color: var(--primary-foreground);
      border: none;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 1.3em;
      color: var(--muted-foreground);
    }
    .status.error { color: var(--danger); }
  </style>
</head>
<body>
  <div class="card">
    <div class="hero">
      <div class="hero-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>
        </svg>
      </div>
      <h1>Trust Check for Job Posts</h1>
      <p>Verify job listings before you apply. Get risk scores and evidence-based analysis.</p>
    </div>
    <button id="scan" class="btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18"/>
        <path d="M7 12h10"/>
        <path d="M10 18h4"/>
        <path d="M5 12l2-6h10l2 6"/>
      </svg>
      Scan this listing
    </button>
    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
